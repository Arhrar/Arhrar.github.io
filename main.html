*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:radial-gradient(circle at 20% 30%,#0e0b1a,#03010a);background-attachment:fixed;font-family:'M PLUS Rounded 1c',sans-serif;display:flex;justify-content:center;align-items:center;padding:1.5rem;position:relative}
body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background-image:radial-gradient(2px 2px at 15% 30%,#fff,transparent),radial-gradient(3px 3px at 75% 45%,#ffb7d2,transparent),radial-gradient(1px 1px at 95% 80%,#e0c3ff,transparent);background-size:200px 200px,180px 180px,150px 150px;pointer-events:none;z-index:0;opacity:0.6}
._1{position:relative;z-index:10;max-width:520px;width:100%;background:rgba(18,12,28,0.65);backdrop-filter:blur(14px);border-radius:2.5rem;border:1px solid rgba(210,170,250,0.35);box-shadow:0 25px 45px rgba(0,0,0,0.5),0 0 0 1px rgba(190,130,230,0.2) inset;padding:2rem 1.8rem 1.8rem;text-align:center}
._2{margin-bottom:0.8rem}
._3{width:100px;height:100px;margin:0 auto;border-radius:50%;overflow:hidden;box-shadow:0 12px 22px rgba(156,80,210,0.4);background:#1f1430}
._3 img{width:100%;height:100%;object-fit:cover;display:block}
._4{font-size:1.9rem;font-weight:800;background:linear-gradient(130deg,#FFE9F5,#e7c9ff,#cba5ff);background-clip:text;-webkit-background-clip:text;color:transparent;margin-bottom:0.2rem}
._5{font-size:0.85rem;color:#bfa7e6;margin-bottom:1rem;border-bottom:1px dashed #644e8c;display:inline-block;padding-bottom:5px}
._6{width:70px;height:3px;background:linear-gradient(90deg,#bd93f9,#ff80bf);margin:8px auto 20px auto;border-radius:4px}
._7{display:flex;flex-direction:column;gap:1rem;margin:1rem 0 0.5rem}
._8{display:flex;align-items:center;justify-content:space-between;background:rgba(30,20,45,0.7);backdrop-filter:blur(4px);padding:0.85rem 1.4rem;border-radius:80px;text-decoration:none;transition:all 0.25s cubic-bezier(0.2,0.9,0.4,1.1);border:1px solid rgba(190,140,230,0.5);box-shadow:0 5px 12px rgba(0,0,0,0.2)}
._8:hover{background:rgba(55,35,85,0.85);border-color:#e2acff;transform:translateY(-3px);box-shadow:0 12px 22px rgba(110,60,170,0.35)}
._8:hover ._10{transform:translateX(5px);color:#ffc2e6}
._9{display:flex;align-items:center;gap:14px}
._9 i{font-size:1.7rem;width:34px;text-align:center;transition:transform 0.2s}
._8:hover ._9 i{transform:scale(1.07)}
._11{font-weight:600;font-size:1rem;color:#f3eaff}
._10{color:#b893f0;font-size:0.9rem;transition:transform 0.2s,color 0.2s}
._12{color:#bd7eff;text-shadow:0 0 2px #a05eff}
._13{color:#66c2ff}
._14{color:#a9def0}
._15{color:#ffabd9}
._16{margin-top:1.8rem;text-align:center;font-size:0.75rem;color:#af95d6;display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap;background:rgba(0,0,0,0.2);padding:6px 16px;border-radius:60px;width:fit-content;margin-left:auto;margin-right:auto;backdrop-filter:blur(2px)}
._16 a{color:#ffcef0;text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:0.2s;background:rgba(255,230,255,0.1);padding:4px 12px;border-radius:40px}
._16 a i{font-size:0.9rem}
._16 a:hover{color:white;background:#b862b6a0}
@media (max-width:480px){
._1{padding:1.2rem}
._4{font-size:1.6rem}
._11{font-size:0.85rem}
._8{padding:0.7rem 1.2rem}
}
